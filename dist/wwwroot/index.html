<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯匙雲端POS系統 - 最佳的好選擇</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, var(--login-bg) 0%, #1c1917 100%); /* 深色胡桃木沉穩漸層 */
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 35px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(28, 25, 23, 0.4);
            border: 1px solid var(--border);
            text-align: center;
            animation: fadeInCard 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header i {
            font-size: 3.2rem;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .login-header h2 {
            font-size: 1.5rem;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 30px;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-wrapper input, 
        .input-wrapper select {
            width: 100%;
            padding: 13px 12px 13px 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            background: #fffdfa;
            color: var(--text);
        }

        .input-wrapper input:focus, 
        .input-wrapper select:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2);
        }

        .btn-login:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(225, 29, 72, 0.3);
        }
        
        .btn-login:active { 
            transform: translateY(1px); 
        }

        .btn-login:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .login-error {
            background: #fff1f2;
            color: var(--danger);
            border: 1px solid #ffe4e6;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            margin-top: 15px;
            display: none;
            font-weight: 600;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-store"></i>
            <h2>飯匙雲端POS系統</h2>
            <p>小型攤販與店家的好選擇</p>
        </div>

        <form id="loginForm" onsubmit="handleLoginExecute(event)">
            <div class="input-group">
                <label>選擇員工編號</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-circle-user"></i>
                    <select id="login-staff-select" required>
                        <option value="" disabled selected>⏳ 正在讀取雲端人事名冊...</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 10px;">
                <label>請輸入密碼</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="請輸入純數字密碼" required pattern="[0-9]*" inputmode="numeric">
                </div>
            </div>

            <div class="login-error" id="login-error-msg">
                <i class="fa-solid fa-circle-exclamation"></i> <span>密碼錯誤，請重新輸入！</span>
            </div>

            <button type="submit" class="btn-login" id="login-submit-btn">
                <i class="fa-solid fa-key"></i> 登入系統
            </button>
        </form>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    
</body>
</html>
